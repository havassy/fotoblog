name: Auto create or update post from image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'assets/images/**'

permissions:
  contents: write

jobs:
  generate-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate or update post files from JPG + XMP
        shell: bash
        run: |
          mkdir -p _posts

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          echo "Before: $BEFORE_SHA"
          echo "After: $AFTER_SHA"

          changed_files=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" || true)

          echo "Changed files:"
          echo "$changed_files"

          if [ -z "$changed_files" ]; then
            echo "No changed files found."
            exit 0
          fi

          export CHANGED_FILES="$changed_files"

          python3 <<'PY'
          import os
          import re
          import xml.etree.ElementTree as ET
          from pathlib import Path

          POSTS_DIR = Path("_posts")
          IMAGES_DIR = Path("assets/images")
          POSTS_DIR.mkdir(exist_ok=True)

          NS = {
              "rdf": "http://www.w3.org/1999/02/22-rdf-syntax-ns#",
              "dc": "http://purl.org/dc/elements/1.1/",
              "exif": "http://ns.adobe.com/exif/1.0/",
              "lr": "http://ns.adobe.com/lightroom/1.0/",
              "photoshop": "http://ns.adobe.com/photoshop/1.0/",
          }

          IMAGE_EXTS = {".jpg", ".jpeg", ".png", ".webp"}

          changed_files = [line.strip() for line in os.environ.get("CHANGED_FILES", "").splitlines() if line.strip()]

          def clean_text(s):
              if not s:
                  return ""
              return re.sub(r"\s+", " ", s).strip()

          def fallback_title(slug):
              s = slug.replace("-", " ").replace("_", " ").strip()
              return s[:1].upper() + s[1:] if s else slug

          def yaml_quote(s):
              return s.replace('"', "'")

          def find_attr(root, attr_ns, attr_name):
              desc = root.find(".//rdf:Description", NS)
              if desc is None:
                  return ""
              return clean_text(desc.attrib.get(f"{{{attr_ns}}}{attr_name}", ""))

          def find_text(root, xpath):
              el = root.find(xpath, NS)
              if el is not None and el.text:
                  return clean_text(el.text)
              return ""

          def parse_gps_coord(value):
              value = clean_text(value)
              if not value:
                  return None

              m = re.match(r'^([0-9]+),([0-9.]+)([NSEW])$', value)
              if not m:
                  return None

              degrees = float(m.group(1))
              minutes = float(m.group(2))
              direction = m.group(3)

              decimal = degrees + (minutes / 60.0)

              if direction in ("S", "W"):
                  decimal = -decimal

              return round(decimal, 6)

          def find_list(root, xpath):
              out = []
              for el in root.findall(xpath, NS):
                  if el.text:
                      txt = clean_text(el.text)
                      if txt:
                          out.append(txt)
              return out

          def unique_keep_order(items):
              seen = set()
              out = []
              for item in items:
                  if item not in seen:
                      seen.add(item)
                      out.append(item)
              return out

          def extract_leaf_tags(root):
              hierarchical = find_list(root, ".//lr:hierarchicalSubject/rdf:Bag/rdf:li")
              print("DEBUG hierarchical:", hierarchical)
              if hierarchical:
                  leaves = []
                  for item in hierarchical:
                      parts = [clean_text(p) for p in item.split("|") if clean_text(p)]
                      if parts:
                          leaves.append(parts[-1])
                  leaves = unique_keep_order(leaves)
                  print("DEBUG leaf tags:", leaves)
                  return leaves

              weighted = find_list(root, ".//lr:weightedFlatSubject/rdf:Bag/rdf:li")
              print("DEBUG weightedFlat:", weighted)
              if weighted:
                  return unique_keep_order(weighted)

              return []

          def find_existing_post(slug):
              matches = sorted(POSTS_DIR.glob(f"*-{slug}.md"))
              return matches[0] if matches else None

          def find_image_for_slug(slug):
              for ext in [".jpg", ".jpeg", ".png", ".webp"]:
                  candidate = IMAGES_DIR / f"{slug}{ext}"
                  if candidate.exists():
                      return candidate
              return None

          def collect_targets(changed_files):
              targets = set()

              for file in changed_files:
                  path = Path(file)

                  if not str(path).startswith("assets/images/"):
                      continue

                  ext = path.suffix.lower()

                  if ext in IMAGE_EXTS:
                      targets.add(str(path))

                  elif ext == ".xmp":
                      slug = path.stem
                      image_path = find_image_for_slug(slug)
                      if image_path:
                          targets.add(str(image_path))
                      else:
                          print(f"No matching image found for XMP: {path}")

              return sorted(targets)

          target_images = collect_targets(changed_files)

          print("Target image files to process:")
          for t in target_images:
              print(f" - {t}")

          if not target_images:
              print("No target image files to process.")
              raise SystemExit(0)

          for file in target_images:
              image_path = Path(file)
              slug = image_path.stem
              xmp_path = image_path.with_suffix(".xmp")

              title = fallback_title(slug)
              date_value = ""
              tags = []
              description = ""
              lat = None
              lon = None

              if xmp_path.exists():
                  try:
                      tree = ET.parse(xmp_path)
                      root = tree.getroot()

                      title = find_text(root, ".//dc:title/rdf:Alt/rdf:li") or title
                      description = find_text(root, ".//dc:description/rdf:Alt/rdf:li")
                      tags = extract_leaf_tags(root)

                      gps_lat_raw = find_attr(root, NS["exif"], "GPSLatitude")
                      gps_lon_raw = find_attr(root, NS["exif"], "GPSLongitude")

                      print("DEBUG GPS RAW:", gps_lat_raw, gps_lon_raw)

                      lat = parse_gps_coord(gps_lat_raw)
                      lon = parse_gps_coord(gps_lon_raw)

                      print("DEBUG GPS:", lat, lon)

                      date_value = find_attr(root, NS["exif"], "DateTimeOriginal")
                      if not date_value:
                          date_value = find_text(root, ".//exif:DateTimeOriginal")
                      if not date_value:
                          date_value = find_attr(root, "http://ns.adobe.com/photoshop/1.0/", "DateCreated")
                      if not date_value:
                          date_value = find_text(root, ".//photoshop:DateCreated")

                      print("DEBUG final tags:", tags)
                      print("DEBUG GPS:", lat, lon)

                  except Exception as e:
                      print(f"XMP parse error for {xmp_path}: {e}")

              if not date_value:
                  date_value = "2026-01-01T12:00:00+00:00"

              date_prefix = date_value[:10]
              desired_post_path = POSTS_DIR / f"{date_prefix}-{slug}.md"
              existing_post_path = find_existing_post(slug)

              if description:
                  body = description + "\n"
              else:
                  body = ""

              lines = [
                  "---",
                  "layout: post",
                  f'title: "{yaml_quote(title)}"',
                  f"date: {date_value}",
                  f'image: "/{file}"',
              ]

              if lat is not None and lon is not None:
                  lines.append(f"lat: {lat}")
                  lines.append(f"lon: {lon}")

              if tags:
                  lines.append("tags:")
                  for tag in tags:
                      lines.append(f'  - "{yaml_quote(tag)}"')

              if description:
                  lines.append(f'description: "{yaml_quote(description)}"')

              lines.extend([
                  "---",
                  "",
                  body.rstrip(),
                  ""
              ])

              final_content = "\n".join(lines)

              target_path = existing_post_path if existing_post_path else desired_post_path

              if existing_post_path and existing_post_path != desired_post_path:
                  if desired_post_path.exists():
                      print(f"Target already exists, keeping existing file: {existing_post_path}")
                      target_path = existing_post_path
                  else:
                      existing_post_path.rename(desired_post_path)
                      target_path = desired_post_path
                      print(f"Renamed post to match new date: {target_path}")

              old_final = ""
              if target_path.exists():
                  old_final = target_path.read_text(encoding="utf-8")

              if old_final != final_content:
                  target_path.write_text(final_content, encoding="utf-8")
                  print(f"Created/updated {target_path}")
              else:
                  print(f"No changes needed for {target_path}")
          PY

      - name: Commit generated posts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _posts
          git diff --cached --quiet || git commit -m "Auto-create/update posts from images"
          git push
