name: Auto create post from image

on:
  push:
    branches:
      - main
    paths:
      - 'assets/images/**'

permissions:
  contents: write

jobs:
  generate-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate post files from JPG + XMP
        shell: bash
        run: |
          mkdir -p _posts

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          echo "Before: $BEFORE_SHA"
          echo "After: $AFTER_SHA"

          changed_files=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" | grep -E '^assets/images/.*\.(jpg|jpeg|png|webp)$' || true)

          echo "Changed image files:"
          echo "$changed_files"

          if [ -z "$changed_files" ]; then
            echo "No image files found."
            exit 0
          fi

          export CHANGED_FILES="$changed_files"

          python3 <<'PY'
          import os
          import re
          import xml.etree.ElementTree as ET
          from pathlib import Path

          POSTS_DIR = Path("_posts")
          POSTS_DIR.mkdir(exist_ok=True)

          NS = {
              "rdf": "http://www.w3.org/1999/02/22-rdf-syntax-ns#",
              "dc": "http://purl.org/dc/elements/1.1/",
              "exif": "http://ns.adobe.com/exif/1.0/",
          }

          changed_files = [line.strip() for line in os.environ.get("CHANGED_FILES", "").splitlines() if line.strip()]

          def clean_text(s):
              if not s:
                  return ""
              return re.sub(r"\s+", " ", s).strip()

          def fallback_title(slug):
              s = slug.replace("-", " ").replace("_", " ").strip()
              return s[:1].upper() + s[1:] if s else slug

          def yaml_quote(s):
              return s.replace('"', "'")

          def find_attr(root, attr_ns, attr_name):
              desc = root.find(".//rdf:Description", NS)
              if desc is None:
                  return ""
              return clean_text(desc.attrib.get(f"{{{attr_ns}}}{attr_name}", ""))

          def find_text(root, xpath):
              el = root.find(xpath, NS)
              if el is not None and el.text:
                  return clean_text(el.text)
              return ""

          def find_list(root, xpath):
              out = []
              for el in root.findall(xpath, NS):
                  if el.text:
                      txt = clean_text(el.text)
                      if txt:
                          out.append(txt)
              return out

          for file in changed_files:
              image_path = Path(file)
              slug = image_path.stem
              ext = image_path.suffix.lower()
              xmp_path = image_path.with_suffix(".xmp")

              title = fallback_title(slug)
              date_value = ""
              tags = []
              description = ""

              if xmp_path.exists():
                  try:
                      tree = ET.parse(xmp_path)
                      root = tree.getroot()

                      title = find_text(root, ".//dc:title/rdf:Alt/rdf:li") or title
                      description = find_text(root, ".//dc:description/rdf:Alt/rdf:li")
                      tags = find_list(root, ".//dc:subject/rdf:Bag/rdf:li")

                      date_value = find_attr(root, NS["exif"], "DateTimeOriginal")
                      if not date_value:
                          date_value = find_text(root, ".//exif:DateTimeOriginal")

                      if not date_value:
                          date_value = find_attr(root, "http://ns.adobe.com/photoshop/1.0/", "DateCreated")

                  except Exception as e:
                      print(f"XMP parse error for {xmp_path}: {e}")

              if not date_value:
                  date_value = "2026-01-01T12:00:00+00:00"

              date_prefix = date_value[:10]
              post_path = POSTS_DIR / f"{date_prefix}-{slug}.md"

              if post_path.exists():
                  print(f"Post already exists: {post_path}")
                  continue

              lines = [
                  "---",
                  "layout: post",
                  f'title: "{yaml_quote(title)}"',
                  f"date: {date_value}",
                  f'image: "/{file}"',
              ]

              if tags:
                  lines.append("tags:")
                  for tag in tags:
                      lines.append(f'  - "{yaml_quote(tag)}"')

              if description:
                  lines.append(f'description: "{yaml_quote(description)}"')

              lines.extend([
                  "---",
                  "",
              ])

              if description:
                  lines.append(description)
              else:
                  lines.append("Ide jön a leírás.")

              lines.append("")

              post_path.write_text("\n".join(lines), encoding="utf-8")
              print(f"Created {post_path}")
          PY

      - name: Commit generated posts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _posts
          git diff --cached --quiet || git commit -m "Auto-create posts from images"
          git push
