name: Auto create post from image

on:
  push:
    branches:
      - main
    paths:
      - 'assets/images/**'

permissions:
  contents: write

jobs:
  generate-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate post files
        shell: bash
        run: |
          mkdir -p _posts

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          echo "Before: $BEFORE_SHA"
          echo "After: $AFTER_SHA"

          changed_files=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" | grep -E '^assets/images/.*\.(jpg|jpeg|png|webp)$' || true)

          echo "Changed image files:"
          echo "$changed_files"

          if [ -z "$changed_files" ]; then
            echo "No image files found."
            exit 0
          fi

          for file in $changed_files; do
            filename=$(basename "$file")
            slug="${filename%.*}"

            date_prefix=$(date +%Y-%m-%d)
            post_path="_posts/${date_prefix}-${slug}.md"

            if [ -f "$post_path" ]; then
              echo "Post already exists: $post_path"
              continue
            fi

            title=$(echo "$slug" | sed 's/[-_]/ /g')

            echo "---" > "$post_path"
            echo "layout: post" >> "$post_path"
            echo "title: \"$title\"" >> "$post_path"
            echo "date: $date_prefix" >> "$post_path"
            echo "image: /$file" >> "$post_path"
            echo "---" >> "$post_path"
            echo "" >> "$post_path"
            echo "Ide jön a leírás." >> "$post_path"

            echo "Created $post_path"
          done

      - name: Commit generated posts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _posts
          git diff --cached --quiet || git commit -m "Auto-create posts from images"
          git push
