name: Auto create post from image

on:
  push:
    branches:
      - main
    paths:
      - 'assets/images/**'

permissions:
  contents: write

jobs:
  generate-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate post files
        run: |
          mkdir -p _posts

          changed_files=$(git diff --name-only HEAD^ HEAD | grep '^assets/images/.*\.\(jpg\|jpeg\|png\|webp\)$' || true)

          if [ -z "$changed_files" ]; then
            echo "No new image files found."
            exit 0
          fi

          for file in $changed_files; do
            filename=$(basename "$file")
            slug="${filename%.*}"

            date_prefix=$(date +%Y-%m-%d)
            post_path="_posts/${date_prefix}-${slug}.md"

            if [ -f "$post_path" ]; then
              echo "Post already exists: $post_path"
              continue
            fi

            title=$(echo "$slug" | sed 's/[-_]/ /g')

            cat > "$post_path" <<EOF
---
layout: post
title: "$title"
date: $date_prefix
image: /$file
---

Ide jön a leírás.
EOF

            echo "Created $post_path"
          done

      - name: Commit generated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _posts
          git diff --cached --quiet || git commit -m "Auto-create posts from images"
          git push
