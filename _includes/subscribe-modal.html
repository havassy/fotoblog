<style>
  .subscribe-modal {
    padding: 0;
    border: 0;
    background: transparent;
    max-width: min(92vw, 560px);
    width: 100%;
  }

  .subscribe-modal::backdrop {
    background: rgba(25, 22, 18, 0.58);
    backdrop-filter: blur(2px);
  }

  .subscribe-modal-card {
    position: relative;
    background: var(--surface, #fffdf9);
    color: var(--text, #2a2621);
    border: 1px solid var(--border, #ddd6cd);
    border-radius: 16px;
    box-shadow: 0 16px 50px rgba(0, 0, 0, 0.18);
    padding: 22px 22px 20px;
  }

  .subscribe-modal-close {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 38px;
    height: 38px;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: var(--muted, #746f68);
    font-size: 1.5rem;
    line-height: 1;
    cursor: pointer;
  }

  .subscribe-modal-close:hover {
    background: rgba(0, 0, 0, 0.06);
    color: var(--text, #2a2621);
  }

  .subscribe-modal-intro {
    margin-bottom: 14px;
    padding-right: 36px;
  }

  .subscribe-modal-intro h2 {
    margin: 0 0 8px;
    font-size: 1.4rem;
    line-height: 1.2;
  }

  .subscribe-modal-intro p {
    margin: 0;
    color: var(--muted, #746f68);
  }

  .subscribe-embed {
    margin-top: 8px;
  }

  @media (max-width: 640px) {
    .subscribe-modal-card {
      padding: 18px 18px 16px;
      border-radius: 14px;
    }

    .subscribe-modal-intro h2 {
      font-size: 1.25rem;
    }
  }
</style>

<script>
  (function () {
    if (window.__subscribeModalInitialized) return;
    window.__subscribeModalInitialized = true;

    const modal = document.querySelector('[data-subscribe-modal]');
    const openButtons = document.querySelectorAll('[data-subscribe-open]');
    const closeButtons = document.querySelectorAll('[data-subscribe-close]');
    let lastTrigger = null;

    if (!modal) return;

    function openModal(event) {
      if (event) {
        event.preventDefault();
        lastTrigger = event.currentTarget;
      }
      if (typeof modal.showModal === 'function') {
        modal.showModal();
      } else {
        modal.setAttribute('open', 'open');
      }
    }

    function closeModal() {
      if (typeof modal.close === 'function') {
        modal.close();
      } else {
        modal.removeAttribute('open');
      }

      if (lastTrigger) {
        lastTrigger.focus();
      }
    }

    openButtons.forEach(function (button) {
      button.addEventListener('click', openModal);
    });

    closeButtons.forEach(function (button) {
      button.addEventListener('click', closeModal);
    });

    modal.addEventListener('click', function (event) {
      const rect = modal.getBoundingClientRect();
      const clickedInDialog =
        rect.top <= event.clientY &&
        event.clientY <= rect.top + rect.height &&
        rect.left <= event.clientX &&
        event.clientX <= rect.left + rect.width;

      if (!clickedInDialog) {
        closeModal();
      }
    });

    modal.addEventListener('cancel', function (event) {
      event.preventDefault();
      closeModal();
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape' && modal.hasAttribute('open')) {
        closeModal();
      }
    });
  })();
</script>
