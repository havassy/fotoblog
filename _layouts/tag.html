---
layout: default
---

<h1>Címke: {{ page.tag }}</h1>

{% assign posts = site.tags[page.tag] %}

{% if posts and posts.size > 0 %}
  <ul>
    {% for post in posts %}
      <li>
        <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
        <small>— {{ post.date | date: "%Y-%m-%d" }}</small>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p>Nincs bejegyzés ehhez a címkéhez.</p>
{% endif %}
