---
layout: default
title: Térképes nézet
permalink: /map/
---

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""
>

<style>
  .map-wrap{
    max-width:1200px;
    margin:0 auto;
    padding:24px 24px 32px;
  }

  .page-header{
    padding:24px 0 20px;
  }

  .map-wrap h1{
    margin:0 0 10px;
    font-size:clamp(2rem, 3vw, 3rem);
    line-height:1.1;
  }

  p.lead{
    margin:0 0 16px;
    color:var(--muted);
  }

  #map{
    width:100%;
    height:600px;
    border-radius:16px;
    border:1px solid var(--border);
    box-shadow:0 8px 24px rgba(0,0,0,0.08);
    overflow:hidden;
  }

  .map-legend{
    margin-top:16px;
    font-size:0.95rem;
    color:var(--muted);
  }

  .map-legend a{
    color:var(--accent);
    text-decoration:none;
    font-weight:600;
  }

  .map-legend a:hover{
    text-decoration:underline;
  }

  @media (max-width: 640px){
    .map-wrap{
      padding:18px;
    }

    #map{
      height:420px;
    }
  }
</style>

<div class="map-wrap">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    <p class="lead">
      Itt látod térképen azokat a helyeket, ahonnan fotók kerültek fel a blogra.
      A jelölőkre kattintva a megfelelő bejegyzés nyílik meg.
    </p>
  </header>

  <div id="map"></div>

  <p class="map-legend">
    <a href="{{ '/tags/' | relative_url }}">Vissza a címkékhez</a> ·
    <a href="{{ '/' | relative_url }}">Vissza a főoldalra</a>
  </p>
</div>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script>
  const photoMarkers = [
    {% assign first_marker = true %}
    {% for post in site.posts %}
      {% if post.lat and post.lon %}
        {% unless first_marker %},{% endunless %}
        {
          title: {{ post.title | jsonify }},
          url: {{ post.url | relative_url | jsonify }},
          lat: {{ post.lat }},
          lon: {{ post.lon }}
        }
        {% assign first_marker = false %}
      {% endif %}
    {% endfor %}
  ];

  const urlParams = new URLSearchParams(window.location.search);
  const focusedPostUrl = urlParams.get('focus');
</script>

<script>
  const defaultIcon = new L.Icon({
    iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
  });

  const focusedIcon = new L.Icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41],
    popupAnchor: [1, -34],
    shadowSize: [41, 41]
  });

  if (photoMarkers.length === 0) {
    console.warn('Nincs még GPS adat a posztokhoz, a térkép üres lesz.');
    const map = L.map('map').setView([47.4979, 19.0402], 5);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
  } else {
    const map = L.map('map');

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const markers = [];
    let focusedMarker = null;
    let focusedData = null;

    photoMarkers.forEach(function (p) {
      const isFocused = focusedPostUrl && p.url === focusedPostUrl;

      const marker = L.marker([p.lat, p.lon], {
        icon: isFocused ? focusedIcon : defaultIcon
      }).addTo(map);

      marker.bindPopup('<a href="' + p.url + '">' + p.title + '</a>');

      markers.push(marker);

      if (isFocused) {
        focusedMarker = marker;
        focusedData = p;
      }
    });

    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds(), { padding: [40, 40] });

    if (photoMarkers.length === 1) {
      map.setZoom(10);
    }

    if (focusedMarker && focusedData) {
      map.setView([focusedData.lat, focusedData.lon], 12);
      focusedMarker.openPopup();
    }
  }
</script>
